name: Marauder CYD 3.5" + Pi Terminal Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'firmware/features_imported/ESP32Marauder-cyd-master/**'
      - '.github/workflows/marauder_cyd_build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'firmware/features_imported/ESP32Marauder-cyd-master/**'
      - '.github/workflows/marauder_cyd_build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/features_imported/ESP32Marauder-cyd-master
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-marauder-${{ hashFiles('firmware/features_imported/ESP32Marauder-cyd-master/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-marauder-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Fetch vendored Marauder libraries
        run: bash scripts/fetch_libs.sh

      - name: Build firmware (fail on error)
        run: pio run -e marauder_cyd_3_5

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: marauder-cyd-3_5-piterminal
          path: |
            firmware/features_imported/ESP32Marauder-cyd-master/.pio/build/marauder_cyd_3_5/firmware.bin
            firmware/features_imported/ESP32Marauder-cyd-master/.pio/build/marauder_cyd_3_5/firmware.elf
