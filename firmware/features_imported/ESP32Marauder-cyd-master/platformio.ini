; ===========================================================================
;  ESP32 Marauder · CYD 3.5" (ESP32-WROOM-32E + ST7796 320x480 + XPT2046)
;  PlatformIO build with the bundled Pi Terminal add-on.
;
;  The Marauder sources live in esp32_marauder/. Its vendored libraries are in
;  esp32_marauder/libraries/ (+ a couple in libraries/). The Pi Terminal module
;  lives in esp32_marauder/pi_terminal/ and is compiled as part of the sketch.
;
;  Build:   pio run -e marauder_cyd_3_5
;  Flash:   pio run -e marauder_cyd_3_5 -t upload
; ===========================================================================
[platformio]
src_dir = esp32_marauder
default_envs = marauder_cyd_3_5

[env:marauder_cyd_3_5]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; Minimal SPIFFS layout: ~1.9 MB app (OTA) + small SPIFFS for Marauder assets.
board_build.partitions = min_spiffs.csv
board_build.f_flash = 40000000L
board_build.flash_mode = dio

; Use the vendored Marauder libraries (pinned forks/versions) over the registry.
lib_extra_dirs =
    esp32_marauder/libraries
    libraries
lib_ldf_mode = deep+

; Compile the sketch + the pi_terminal module, but never the vendored libs,
; previous-version snapshots or SPIFFS data as application source.
build_src_filter =
    +<*>
    -<libraries/>
    -<PreviousVersions/>
    -<data/>

build_flags =
    ; Legacy tentative-definition merging for Marauder's header globals.
    -fcommon
    ; ---- Board target (activates the CYD 3.5" branch in configs.h) ----
    -D MARAUDER_CYD_3_5_INCH
    -D CORE_DEBUG_LEVEL=0

    ; ---- TFT_eSPI: self-contained setup (ignores User_Setup_Select.h) ----
    -D USER_SETUP_LOADED=1
    -D ST7796_DRIVER=1
    ; Pins 12/13/14/15 are the ESP32 native HSPI IOMUX pins. Using the HSPI port
    ; routes them directly (not via the GPIO matrix) so SPI *reads* work -> this
    ; is required for the XPT2046 touch controller (MISO/GPIO12) to respond.
    -D USE_HSPI_PORT=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=27
    -D TFT_BACKLIGHT_ON=HIGH
    -D TOUCH_CS=33
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000

    ; ---- Pi Terminal UART link (override here to re-pin) ----
    -D PI_UART_BAUD=115200
    -D PI_UART_TX_PIN=26
    -D PI_UART_RX_PIN=35
