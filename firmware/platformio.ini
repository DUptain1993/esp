; ESP32-WROOM-32E Touchscreen Control Terminal
; ST7796 320x480 SPI display + XPT2046 touch, LVGL 8 + TFT_eSPI
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    lvgl/lvgl@^8.3.11
    bodmer/TFT_eSPI@^2.5.43

build_flags =
    ; ---- LVGL ----
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    ; ---- TFT_eSPI (self-contained, no User_Setup.h needed) ----
    -D USER_SETUP_LOADED=1
    -D ST7796_DRIVER=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=27
    -D TFT_BACKLIGHT_ON=HIGH
    -D TOUCH_CS=33
    -D TOUCH_IRQ=36
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    ; ---- SPI: Mode 0, EXACTLY 40 MHz, DMA enabled in code ----
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    -D TFT_SPI_MODE=SPI_MODE0
