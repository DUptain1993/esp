[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    lvgl/lvgl @ ^8.4.0
    bodmer/TFT_eSPI @ ^2.5.43

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D LV_CONF_INCLUDE_SIMPLE
    -I include

    ; TFT CONFIG
    -D USER_SETUP_LOADED=1
    -D ST7796_DRIVER=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=27
    -D TFT_BACKLIGHT_ON=HIGH
    -D USE_HSPI_PORT=1

    ; SAFE SPI SPEED
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
